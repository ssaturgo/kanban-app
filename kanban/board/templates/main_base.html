<!DOCTYPE html>
<html lang="en" data-bs-theme={{ 'dark' if dark_mode else 'light' }}>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('kanban.static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>
<body >
    <div class="d-flex vh-100 bg-body">
        {% include 'components/sidebar.html' %}
        <div class="w-100 flex-shrink-1 overflow-hidden d-flex flex-column flex-grow-1">
            {% include 'components/navbar.html' %}
            <div class="container-fluid p-2 pt-0 flex-grow-1 overflow-auto {{ 'bg-dark' if dark_mode else 'bg-light'}}">
                <div class="rounded-3 p-2 bg-body-tertiary border">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    {% block scripts %}
    {% endblock %}
</body>
</html>
